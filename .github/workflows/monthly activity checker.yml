name: monthly activity checker

on:
  schedule:
    - cron:  '0 1 1 * *' #every first of the month at 01:00
  workflow_dispatch:

jobs:
  bots:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: |
        cd rocker-post-processor
        mvn -B install
        cd ..
        mvn -B package
    - name: Run bot
      env:
        BOT_DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        BOT_PFKEY: ${{ secrets.PFKEY }}
        BOT_SFKEY: ${{ secrets.SFKEY }}
        BOT_ANTI_PROTECTION_SECRET: ${{ secrets.ANTI_PROTECTION_SECRET }}
      run: java -jar target/bots-0.0.0.jar activity-checker
